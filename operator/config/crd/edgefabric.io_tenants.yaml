apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tenants.edgefabric.io
spec:
  group: edgefabric.io
  names:
    plural: tenants
    singular: tenant
    kind: Tenant
    listKind: TenantList
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - name
                - slug
              properties:
                name:
                  type: string
                slug:
                  type: string
            status:
              type: object
              properties:
                id:
                  type: string
                phase:
                  type: string
                message:
                  type: string

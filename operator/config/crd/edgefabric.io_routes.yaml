apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: efroutes.edgefabric.io
spec:
  group: edgefabric.io
  names:
    plural: efroutes
    singular: efroute
    kind: Route
    listKind: RouteList
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - name
                - tenantRef
                - protocol
                - entryIP
                - destinationIP
                - gatewayRef
              properties:
                name:
                  type: string
                tenantRef:
                  type: string
                protocol:
                  type: string
                  enum:
                    - tcp
                    - udp
                    - icmp
                    - all
                entryIP:
                  type: string
                entryPort:
                  type: integer
                destinationIP:
                  type: string
                destinationPort:
                  type: integer
                gatewayRef:
                  type: string
            status:
              type: object
              properties:
                id:
                  type: string
                phase:
                  type: string
                message:
                  type: string

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dnszones.edgefabric.io
spec:
  group: edgefabric.io
  names:
    plural: dnszones
    singular: dnszone
    kind: DNSZone
    listKind: DNSZoneList
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - name
                - tenantRef
              properties:
                name:
                  type: string
                tenantRef:
                  type: string
                records:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                      - type
                      - value
                    properties:
                      name:
                        type: string
                      type:
                        type: string
                      value:
                        type: string
                      ttl:
                        type: integer
                      priority:
                        type: integer
            status:
              type: object
              properties:
                id:
                  type: string
                phase:
                  type: string
                serial:
                  type: integer
                recordCount:
                  type: integer
                message:
                  type: string

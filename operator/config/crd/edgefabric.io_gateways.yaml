apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gateways.edgefabric.io
spec:
  group: edgefabric.io
  names:
    plural: gateways
    singular: gateway
    kind: Gateway
    listKind: GatewayList
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - name
                - publicIP
                - tenantRef
              properties:
                name:
                  type: string
                publicIP:
                  type: string
                tenantRef:
                  type: string
            status:
              type: object
              properties:
                id:
                  type: string
                phase:
                  type: string
                message:
                  type: string

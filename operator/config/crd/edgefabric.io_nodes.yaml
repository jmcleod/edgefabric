apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: efnodes.edgefabric.io
spec:
  group: edgefabric.io
  names:
    plural: efnodes
    singular: efnode
    kind: Node
    listKind: NodeList
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - name
                - hostname
                - publicIP
                - tenantRef
              properties:
                name:
                  type: string
                hostname:
                  type: string
                region:
                  type: string
                publicIP:
                  type: string
                tenantRef:
                  type: string
            status:
              type: object
              properties:
                id:
                  type: string
                phase:
                  type: string
                version:
                  type: string
                wireGuardIP:
                  type: string
                message:
                  type: string

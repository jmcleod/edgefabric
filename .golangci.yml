version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
    staticcheck:
      checks:
        - "all"
        - "-ST*"      # style suggestions (ST1000 package comments, ST1003 naming, ST1005 errors, ST1020 comment form)
        - "-QF*"      # quick-fix suggestions
        - "-SA1019"   # deprecated usage
    revive:
      rules:
        - name: exported
          disabled: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - ineffassign
          - staticcheck

issues:
  max-issues-per-linter: 50
  max-same-issues: 10

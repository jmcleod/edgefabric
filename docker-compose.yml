# EdgeFabric Comprehensive Demo — Docker Compose
#
# Starts the full platform: controller, 2 edge nodes (with real CDN + DNS),
# a gateway (with route forwarding), an origin server, and a VPS.
#
# Usage:
#   docker compose up --build        # Build and start everything
#   docker compose down -v           # Stop and remove all data
#
# After startup (~45s), the following services are available:
#   Controller + SPA:  http://localhost:8443
#   CDN (node-1):      http://localhost:8081  (use Host: www.acme.example)
#   CDN (node-2):      http://localhost:8082  (use Host: www.acme.example)
#   DNS (node-1):      dig @localhost -p 5354 www.acme.example A
#   DNS (node-2):      dig @localhost -p 5355 www.acme.example A
#   Route via gateway: curl http://localhost:9001  (node-1 → gateway → origin)
#   Route via gateway: curl http://localhost:9002  (node-2 → gateway → origin)
#   Origin (direct):   http://localhost:8888
#   VPS (SSH):         ssh root@localhost -p 2222 (password: demo)
#   Gateway health:    http://localhost:9190/healthz

services:
  # ──────────────────────────────────────────────────────────────────
  # Controller — API server, web console, database
  # ──────────────────────────────────────────────────────────────────
  controller:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    entrypoint: ["/bin/sh", "/demo/entrypoint.sh"]
    command: []
    ports:
      - "8443:8443"
    volumes:
      - ef-data:/var/lib/edgefabric
      - ef-shared:/shared
      - ./demo/controller.yaml:/etc/edgefabric/edgefabric.yaml:ro
      - ./demo/entrypoint.sh:/demo/entrypoint.sh:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8443/healthz"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      ef-mesh:
        ipv4_address: 172.20.0.2

  # ──────────────────────────────────────────────────────────────────
  # Demo Setup — seeds data via API, generates enrollment tokens
  # ──────────────────────────────────────────────────────────────────
  demo-setup:
    image: alpine:3.21
    depends_on:
      controller:
        condition: service_healthy
    volumes:
      - ef-shared:/shared
      - ./demo/setup.sh:/demo/setup.sh:ro
    environment:
      CONTROLLER_URL: "http://172.20.0.2:8443"
    command: ["/bin/sh", "-c", "apk add --no-cache curl jq > /dev/null 2>&1 && /bin/sh /demo/setup.sh"]
    networks:
      ef-mesh:

  # ──────────────────────────────────────────────────────────────────
  # Node 1 — edge-us-east-1 (CDN proxy, DNS server, BGP noop, Route forwarder)
  # ──────────────────────────────────────────────────────────────────
  node-1:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    entrypoint: ["/bin/sh", "/demo/node-entrypoint.sh"]
    command: []
    ports:
      - "8081:8080"              # CDN proxy
      - "5354:5353/tcp"          # DNS (TCP)
      - "5354:5353/udp"          # DNS (UDP)
      - "9001:9000"              # Route: http-to-origin (via gateway)
    volumes:
      - ef-shared:/shared:ro
      - node1-data:/var/lib/edgefabric
      - ./demo/node.yaml:/etc/edgefabric/edgefabric.yaml:ro
      - ./demo/node-entrypoint.sh:/demo/node-entrypoint.sh:ro
    environment:
      NODE_NAME: "node-1"
    depends_on:
      demo-setup:
        condition: service_completed_successfully
    networks:
      ef-mesh:
        ipv4_address: 172.20.0.10

  # ──────────────────────────────────────────────────────────────────
  # Node 2 — edge-eu-west-1 (CDN proxy, DNS server, BGP noop, Route forwarder)
  # ──────────────────────────────────────────────────────────────────
  node-2:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    entrypoint: ["/bin/sh", "/demo/node-entrypoint.sh"]
    command: []
    ports:
      - "8082:8080"              # CDN proxy
      - "5355:5353/tcp"          # DNS (TCP)
      - "5355:5353/udp"          # DNS (UDP)
      - "9002:9000"              # Route: http-to-origin (via gateway)
    volumes:
      - ef-shared:/shared:ro
      - node2-data:/var/lib/edgefabric
      - ./demo/node.yaml:/etc/edgefabric/edgefabric.yaml:ro
      - ./demo/node-entrypoint.sh:/demo/node-entrypoint.sh:ro
    environment:
      NODE_NAME: "node-2"
    depends_on:
      demo-setup:
        condition: service_completed_successfully
    networks:
      ef-mesh:
        ipv4_address: 172.20.0.11

  # ──────────────────────────────────────────────────────────────────
  # Gateway — route forwarding (forwarder mode, Docker bridge IPs)
  # ──────────────────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    entrypoint: ["/bin/sh", "/demo/gateway-entrypoint.sh"]
    command: []
    ports:
      - "9190:9090"              # Health/metrics
    volumes:
      - ef-shared:/shared:ro
      - gw-data:/var/lib/edgefabric
      - ./demo/gateway.yaml:/etc/edgefabric/edgefabric.yaml:ro
      - ./demo/gateway-entrypoint.sh:/demo/gateway-entrypoint.sh:ro
    depends_on:
      demo-setup:
        condition: service_completed_successfully
    networks:
      ef-mesh:
        ipv4_address: 172.20.0.50

  # ──────────────────────────────────────────────────────────────────
  # Origin — test HTTP server (Nginx) serving a demo page
  # ──────────────────────────────────────────────────────────────────
  origin:
    build:
      context: demo/origin
      dockerfile: Dockerfile
    ports:
      - "8888:80"
    networks:
      ef-mesh:
        ipv4_address: 172.20.0.100

  # ──────────────────────────────────────────────────────────────────
  # VPS — Alpine with SSH for enrollment demo
  # ──────────────────────────────────────────────────────────────────
  vps:
    build:
      context: .
      dockerfile: demo/vps/Dockerfile
    ports:
      - "2222:22"
    volumes:
      - ef-shared:/shared:ro
    networks:
      ef-mesh:
        ipv4_address: 172.20.0.12

networks:
  ef-mesh:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  ef-data:
  ef-shared:
  node1-data:
  node2-data:
  gw-data:

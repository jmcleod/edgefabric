# EdgeFabric Demo — Docker Compose
#
# Starts the controller and seeds it with sample data.
#
# Usage:
#   docker compose up --build        # Build and start
#   docker compose down -v           # Stop and remove volumes
#
# The controller API is available at http://localhost:8443
# after the demo-setup container prints the summary.

services:
  controller:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    entrypoint: ["/bin/sh", "/demo/entrypoint.sh"]
    command: []
    ports:
      - "8443:8443"
    volumes:
      - ef-data:/var/lib/edgefabric
      - ef-shared:/shared
      - ./demo/controller.yaml:/etc/edgefabric/edgefabric.yaml:ro
      - ./demo/entrypoint.sh:/demo/entrypoint.sh:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8443/healthz"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s

  demo-setup:
    image: alpine:3.21
    depends_on:
      controller:
        condition: service_healthy
    volumes:
      - ef-shared:/shared:ro
      - ./demo/setup.sh:/demo/setup.sh:ro
    environment:
      CONTROLLER_URL: "http://controller:8443"
    command: ["/bin/sh", "-c", "apk add --no-cache curl jq > /dev/null 2>&1 && /bin/sh /demo/setup.sh"]

volumes:
  ef-data:
  ef-shared:

    # --- Networking Schemas ---

    BGPSessionStatus:
      type: string
      enum: [configured, active, down, removed]

    IPAllocationType:
      type: string
      enum: [anycast, unicast]

    IPAllocationPurpose:
      type: string
      enum: [dns, cdn, route]

    IPAllocationStatusEnum:
      type: string
      enum: [active, withdrawn, pending]

    BGPSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        node_id:
          type: string
          format: uuid
        peer_asn:
          type: integer
        peer_address:
          type: string
        local_asn:
          type: integer
        status:
          $ref: "#/components/schemas/BGPSessionStatus"
        announced_prefixes:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    IPAllocation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        prefix:
          type: string
        type:
          $ref: "#/components/schemas/IPAllocationType"
        purpose:
          $ref: "#/components/schemas/IPAllocationPurpose"
        status:
          $ref: "#/components/schemas/IPAllocationStatusEnum"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WireGuardPeer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        owner_type:
          type: string
          enum: [node, gateway, controller]
        owner_id:
          type: string
          format: uuid
        public_key:
          type: string
        allowed_ips:
          type: array
          items:
            type: string
        endpoint:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    NodeNetworkingState:
      type: object
      properties:
        node_id:
          type: string
          format: uuid
        wireguard_ip:
          type: string
        wireguard_peer:
          $ref: "#/components/schemas/WireGuardPeer"
        bgp_sessions:
          type: array
          items:
            $ref: "#/components/schemas/BGPSession"

    DataResponse_BGPSession:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/BGPSession"

    DataResponse_IPAllocation:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/IPAllocation"

    DataResponse_NodeNetworkingState:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/NodeNetworkingState"


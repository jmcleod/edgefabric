openapi: "3.0.3"
info:
  title: EdgeFabric Controller API
  description: |
    REST API for the EdgeFabric distributed edge networking platform.
    Provides multi-tenant management, user authentication (password + TOTP 2FA),
    API key management, fleet management (nodes, node groups, SSH keys),
    audit logging, status dashboard, node provisioning lifecycle,
    enrollment, gateway management, SSH key rotation, networking
    (BGP sessions, IP allocations, WireGuard peers), and node config sync.
  version: "1.3.0"
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8443
    description: Local development

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Authentication, TOTP enrollment, and session management
  - name: Tenants
    description: Multi-tenant management (SuperUser only for mutations)
  - name: Users
    description: User CRUD operations
  - name: Nodes
    description: Edge node inventory management
  - name: Node Groups
    description: Logical grouping of nodes for targeting configuration
  - name: SSH Keys
    description: Global SSH key management (SuperUser only for mutations)
  - name: API Keys
    description: Programmatic access credential management
  - name: Audit
    description: Immutable audit event log
  - name: Provisioning
    description: Node lifecycle actions (enroll, start, stop, restart, upgrade, reprovision, decommission)
  - name: Enrollment
    description: Unauthenticated node enrollment via bootstrap token
  - name: Gateways
    description: Gateway CRUD and heartbeat management
  - name: Status
    description: Fleet dashboard and status overview
  - name: BGP Sessions
    description: BGP session management for nodes
  - name: IP Allocations
    description: IP prefix allocation management for tenants
  - name: WireGuard
    description: WireGuard peer listing (SuperUser only)
  - name: Node Networking
    description: Node networking state and config sync

paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Login successful (or TOTP required)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/totp/verify:
    post:
      tags: [Auth]
      summary: Verify TOTP code after login
      description: Complete 2FA by providing a valid TOTP code. Use the token from the login response.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  pattern: "^[0-9]{6}$"
      responses:
        "200":
          description: TOTP verified, new session token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/totp/enroll:
    post:
      tags: [Auth]
      summary: Start TOTP enrollment
      description: |
        Generates a TOTP secret and provisioning URI. The secret is stored
        encrypted but TOTP is NOT enabled until confirmed via /totp/confirm.
      responses:
        "200":
          description: TOTP enrollment started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TOTPEnrollResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/totp/confirm:
    post:
      tags: [Auth]
      summary: Confirm TOTP enrollment with a code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  pattern: "^[0-9]{6}$"
      responses:
        "200":
          description: TOTP enabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: totp_enabled
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/tenants:
    get:
      tags: [Tenants]
      summary: List tenants
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of tenants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Tenants]
      summary: Create a tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug]
              properties:
                name:
                  type: string
                slug:
                  type: string
                  pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"
                  minLength: 2
      responses:
        "201":
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_Tenant"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Slug already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/tenants/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Tenants]
      summary: Get a tenant by ID
      responses:
        "200":
          description: Tenant details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_Tenant"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Tenants]
      summary: Update a tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                status:
                  $ref: "#/components/schemas/TenantStatus"
      responses:
        "200":
          description: Tenant updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_Tenant"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Tenants]
      summary: Soft-delete a tenant
      description: Sets the tenant status to "deleted". The record is not removed from the database.
      responses:
        "204":
          description: Tenant deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/users:
    get:
      tags: [Users]
      summary: List users
      description: Non-superusers see only their tenant's users.
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
    post:
      tags: [Users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, name, password, role]
              properties:
                tenant_id:
                  type: string
                  format: uuid
                  description: Required for non-superuser roles. Must be omitted for superusers.
                email:
                  type: string
                  format: email
                name:
                  type: string
                password:
                  type: string
                  minLength: 8
                role:
                  $ref: "#/components/schemas/Role"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Email already in use

  /api/v1/users/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Users]
      summary: Get a user by ID
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_User"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Users]
      summary: Update a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                password:
                  type: string
                  minLength: 8
                role:
                  $ref: "#/components/schemas/Role"
                status:
                  $ref: "#/components/schemas/UserStatus"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_User"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Users]
      summary: Delete a user
      responses:
        "204":
          description: User deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/api-keys:
    get:
      tags: [API Keys]
      summary: List API keys for the caller's tenant
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of API keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyListResponse"
    post:
      tags: [API Keys]
      summary: Create an API key
      description: |
        Generates a new API key. The raw key is returned once in the response
        and cannot be retrieved again. Store it securely.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, role]
              properties:
                name:
                  type: string
                role:
                  $ref: "#/components/schemas/Role"
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAPIKeyResponse"

  /api/v1/api-keys/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    delete:
      tags: [API Keys]
      summary: Delete an API key
      responses:
        "204":
          description: API key deleted

  /api/v1/audit-events:
    get:
      tags: [Audit]
      summary: List audit events
      description: SuperUsers see all events; tenant-scoped users see only their tenant's events.
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of audit events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEventListResponse"

  /api/v1/nodes:
    get:
      tags: [Nodes]
      summary: List nodes
      description: Non-superusers see only their tenant's nodes. SuperUsers see all nodes.
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of nodes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Nodes]
      summary: Create a node
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, hostname, public_ip]
              properties:
                name:
                  type: string
                hostname:
                  type: string
                public_ip:
                  type: string
                  format: ipv4
                region:
                  type: string
                provider:
                  type: string
                ssh_port:
                  type: integer
                  default: 22
                ssh_user:
                  type: string
                  default: root
      responses:
        "201":
          description: Node created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_Node"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Node already exists

  /api/v1/nodes/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Nodes]
      summary: Get a node by ID
      description: Enforces tenant isolation for non-superuser callers.
      responses:
        "200":
          description: Node details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_Node"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Nodes]
      summary: Update a node
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                tenant_id:
                  type: string
                  format: uuid
                status:
                  $ref: "#/components/schemas/NodeStatus"
                region:
                  type: string
      responses:
        "200":
          description: Node updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_Node"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Nodes]
      summary: Delete a node
      responses:
        "204":
          description: Node deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/nodes/{id}/heartbeat:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Nodes]
      summary: Record a node heartbeat
      description: Updates the node's last heartbeat timestamp and sets status to online.
      responses:
        "200":
          description: Heartbeat recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/node-groups:
    get:
      tags: [Node Groups]
      summary: List node groups
      description: |
        Returns node groups for a tenant. Non-superusers see only their tenant's groups.
        SuperUsers must provide a tenant_id query parameter.
      parameters:
        - name: tenant_id
          in: query
          description: Required for SuperUser callers to scope the list.
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of node groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeGroupListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Node Groups]
      summary: Create a node group
      description: Tenant is inferred from caller's claims for non-superusers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                tenant_id:
                  type: string
                  format: uuid
                  description: Required for SuperUser. Inferred from token for tenant-scoped users.
                name:
                  type: string
                description:
                  type: string
      responses:
        "201":
          description: Node group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_NodeGroup"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Node group already exists

  /api/v1/node-groups/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Node Groups]
      summary: Get a node group by ID
      description: Enforces tenant isolation for non-superuser callers.
      responses:
        "200":
          description: Node group details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_NodeGroup"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Node Groups]
      summary: Delete a node group
      description: Enforces tenant isolation. Removes the group and its memberships.
      responses:
        "204":
          description: Node group deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/node-groups/{id}/nodes/{nodeId}:
    parameters:
      - $ref: "#/components/parameters/ID"
      - name: nodeId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Node Groups]
      summary: Add a node to a group
      description: Both the group and the node must exist.
      responses:
        "204":
          description: Node added to group
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Node already in group
    delete:
      tags: [Node Groups]
      summary: Remove a node from a group
      responses:
        "204":
          description: Node removed from group
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/ssh-keys:
    get:
      tags: [SSH Keys]
      summary: List SSH keys
      description: Returns all SSH keys. Private keys are never included in responses.
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of SSH keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SSHKeyListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [SSH Keys]
      summary: Create an SSH key
      description: |
        Only SuperUsers can create SSH keys. SSH keys are a global resource
        (not tenant-scoped). The private key is stored encrypted at rest
        and never returned in API responses.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, public_key, private_key]
              properties:
                name:
                  type: string
                public_key:
                  type: string
                private_key:
                  type: string
                  description: Must be pre-encrypted or will be encrypted at rest.
      responses:
        "201":
          description: SSH key created (private key stripped from response)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_SSHKey"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: SSH key already exists

  /api/v1/ssh-keys/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [SSH Keys]
      summary: Get an SSH key by ID
      description: Private key is never included in the response.
      responses:
        "200":
          description: SSH key details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_SSHKey"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [SSH Keys]
      summary: Delete an SSH key
      description: Only SuperUsers can delete SSH keys.
      responses:
        "204":
          description: SSH key deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/ssh-keys/{id}/rotate:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [SSH Keys]
      summary: Rotate an SSH key
      description: Generates a new Ed25519 key pair, encrypts the private key at rest, and updates the stored key.
      responses:
        "200":
          description: Key rotated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_SSHKey"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/ssh-keys/{id}/deploy:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [SSH Keys]
      summary: Deploy SSH key to nodes
      description: Appends the current public key to authorized_keys on all online nodes using this key.
      responses:
        "200":
          description: Key deployed to nodes
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/nodes/{id}/{action}:
    parameters:
      - $ref: "#/components/parameters/ID"
      - name: action
        in: path
        required: true
        schema:
          type: string
          enum: [enroll, start, stop, restart, upgrade, reprovision, decommission]
    post:
      tags: [Provisioning]
      summary: Trigger a provisioning action on a node
      description: |
        Creates a ProvisioningJob and runs the action pipeline asynchronously.
        Returns the job immediately with status "pending".
      responses:
        "202":
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_ProvisioningJob"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Invalid state transition or concurrent job

  /api/v1/nodes/{id}/jobs:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Provisioning]
      summary: List provisioning jobs for a node
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of provisioning jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvisioningJobListResponse"

  /api/v1/provisioning/jobs/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Provisioning]
      summary: Get a provisioning job by ID
      responses:
        "200":
          description: Provisioning job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_ProvisioningJob"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/enroll:
    post:
      tags: [Enrollment]
      summary: Complete node enrollment
      description: |
        Unauthenticated endpoint. The node agent calls this with a bootstrap
        token after SSH-push deployment. The token serves as authentication.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: Bootstrap enrollment token
      responses:
        "200":
          description: Node enrolled
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Invalid enrollment token
        "409":
          description: Token already used

  /api/v1/gateways:
    get:
      tags: [Gateways]
      summary: List gateways
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of gateways
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GatewayListResponse"
    post:
      tags: [Gateways]
      summary: Create a gateway
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                tenant_id:
                  type: string
                  format: uuid
                public_ip:
                  type: string
                region:
                  type: string
      responses:
        "201":
          description: Gateway created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_Gateway"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Gateway already exists

  /api/v1/gateways/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Gateways]
      summary: Get a gateway by ID
      responses:
        "200":
          description: Gateway details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_Gateway"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Gateways]
      summary: Update a gateway
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                public_ip:
                  type: string
                region:
                  type: string
      responses:
        "200":
          description: Gateway updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_Gateway"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Gateways]
      summary: Delete a gateway
      responses:
        "204":
          description: Gateway deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/gateways/{id}/heartbeat:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Gateways]
      summary: Record a gateway heartbeat
      responses:
        "200":
          description: Heartbeat recorded
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/status:
    get:
      tags: [Status]
      summary: Fleet status dashboard
      description: |
        Returns a fleet overview including user count, node count, and nodes
        grouped by status. SuperUsers additionally see tenant count.
        Requires authentication and read permission on nodes.
      responses:
        "200":
          description: Fleet status overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_Status"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # --- BGP Sessions ---
  /api/v1/nodes/{nodeId}/bgp-sessions:
    parameters:
      - name: nodeId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [BGP Sessions]
      summary: List BGP sessions for a node
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of BGP sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BGPSessionListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [BGP Sessions]
      summary: Create a BGP session for a node
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [peer_asn, peer_address, local_asn]
              properties:
                peer_asn:
                  type: integer
                  minimum: 1
                peer_address:
                  type: string
                  format: ipv4
                local_asn:
                  type: integer
                  minimum: 1
                announced_prefixes:
                  type: array
                  items:
                    type: string
                  description: CIDR prefixes to announce via this session
      responses:
        "201":
          description: BGP session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_BGPSession"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/bgp-sessions/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [BGP Sessions]
      summary: Get a BGP session by ID
      responses:
        "200":
          description: BGP session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_BGPSession"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [BGP Sessions]
      summary: Update a BGP session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                peer_asn:
                  type: integer
                peer_address:
                  type: string
                local_asn:
                  type: integer
                status:
                  $ref: "#/components/schemas/BGPSessionStatus"
                announced_prefixes:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: BGP session updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_BGPSession"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [BGP Sessions]
      summary: Delete a BGP session
      responses:
        "204":
          description: BGP session deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # --- IP Allocations ---
  /api/v1/tenants/{tenantId}/ip-allocations:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [IP Allocations]
      summary: List IP allocations for a tenant
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of IP allocations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IPAllocationListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [IP Allocations]
      summary: Create an IP allocation for a tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prefix, type, purpose]
              properties:
                prefix:
                  type: string
                  description: CIDR prefix (e.g. "203.0.113.0/24")
                type:
                  $ref: "#/components/schemas/IPAllocationType"
                purpose:
                  $ref: "#/components/schemas/IPAllocationPurpose"
      responses:
        "201":
          description: IP allocation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_IPAllocation"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/ip-allocations/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [IP Allocations]
      summary: Get an IP allocation by ID
      responses:
        "200":
          description: IP allocation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_IPAllocation"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [IP Allocations]
      summary: Update an IP allocation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: "#/components/schemas/IPAllocationStatusEnum"
                purpose:
                  $ref: "#/components/schemas/IPAllocationPurpose"
      responses:
        "200":
          description: IP allocation updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_IPAllocation"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [IP Allocations]
      summary: Delete an IP allocation
      responses:
        "204":
          description: IP allocation deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # --- WireGuard ---
  /api/v1/wireguard/peers:
    get:
      tags: [WireGuard]
      summary: List all WireGuard peers (SuperUser only)
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of WireGuard peers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WireGuardPeerListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # --- Node Networking ---
  /api/v1/nodes/{id}/networking:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Node Networking]
      summary: Get aggregated networking state for a node
      description: |
        Returns the node's WireGuard IP, WireGuard peer record,
        and all configured BGP sessions.
      responses:
        "200":
          description: Node networking state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataResponse_NodeNetworkingState"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/nodes/{id}/config/wireguard:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Node Networking]
      summary: Get WireGuard config for a node
      description: Returns the node's wg0.conf content as text/plain.
      responses:
        "200":
          description: WireGuard configuration file
          content:
            text/plain:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/nodes/{id}/config/bgp:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Node Networking]
      summary: Get desired BGP sessions for a node
      description: Returns the desired BGP session configuration for node-side reconciliation.
      responses:
        "200":
          description: Desired BGP sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BGPSessionListResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /healthz:
    get:
      tags: [Infrastructure]
      summary: Health check
      security: []
      responses:
        "200":
          description: Healthy
        "503":
          description: Unhealthy

  /metrics:
    get:
      tags: [Infrastructure]
      summary: Prometheus metrics
      security: []
      responses:
        "200":
          description: Prometheus text format metrics

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Session token (from /auth/login) or API key (prefixed with ef_).
        Example: `Authorization: Bearer <token>` or `Authorization: Bearer ef_<key>`

  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50

  schemas:
    Role:
      type: string
      enum: [superuser, admin, readonly]

    TenantStatus:
      type: string
      enum: [active, suspended, deleted]

    UserStatus:
      type: string
      enum: [active, disabled]

    Tenant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        status:
          $ref: "#/components/schemas/TenantStatus"
        settings:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
          nullable: true
        email:
          type: string
          format: email
        name:
          type: string
        totp_enabled:
          type: boolean
        role:
          $ref: "#/components/schemas/Role"
        status:
          $ref: "#/components/schemas/UserStatus"
        last_login_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    APIKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
        key_prefix:
          type: string
        role:
          $ref: "#/components/schemas/Role"
        expires_at:
          type: string
          format: date-time
          nullable: true
        last_used_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    AuditEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
          nullable: true
        user_id:
          type: string
          format: uuid
          nullable: true
        api_key_id:
          type: string
          format: uuid
          nullable: true
        action:
          type: string
        resource:
          type: string
        details:
          type: object
        source_ip:
          type: string
        timestamp:
          type: string
          format: date-time

    NodeStatus:
      type: string
      enum: [pending, enrolling, online, offline, error, decommissioned]

    NodeCapability:
      type: string
      enum: [bgp, dns, cdn, route]

    Node:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        hostname:
          type: string
        public_ip:
          type: string
        wireguard_ip:
          type: string
        status:
          $ref: "#/components/schemas/NodeStatus"
        region:
          type: string
        provider:
          type: string
        ssh_port:
          type: integer
        ssh_user:
          type: string
        ssh_key_id:
          type: string
          format: uuid
          nullable: true
        binary_version:
          type: string
        last_heartbeat:
          type: string
          format: date-time
          nullable: true
        capabilities:
          type: array
          items:
            $ref: "#/components/schemas/NodeCapability"
        metadata:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    NodeGroup:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SSHKey:
      type: object
      description: SSH key (private key is never returned in API responses).
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        public_key:
          type: string
        fingerprint:
          type: string
        created_at:
          type: string
          format: date-time
        last_rotated_at:
          type: string
          format: date-time

    ProvisioningAction:
      type: string
      enum: [enroll, start, stop, restart, upgrade, reprovision, decommission]

    ProvisioningStatus:
      type: string
      enum: [pending, running, completed, failed]

    ProvisioningJob:
      type: object
      properties:
        id:
          type: string
          format: uuid
        node_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
          nullable: true
        action:
          $ref: "#/components/schemas/ProvisioningAction"
        status:
          $ref: "#/components/schemas/ProvisioningStatus"
        current_step:
          type: string
        steps:
          type: array
          items:
            type: object
            properties:
              step:
                type: string
              status:
                type: string
              started_at:
                type: string
                format: date-time
              duration_ms:
                type: integer
              output:
                type: string
              error:
                type: string
        error:
          type: string
          nullable: true
        initiated_by:
          type: string
          format: uuid
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Gateway:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        public_ip:
          type: string
        wireguard_ip:
          type: string
        status:
          type: string
          enum: [pending, online, offline, error]
        region:
          type: string
        last_heartbeat:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StatusOverview:
      type: object
      properties:
        version:
          type: string
        tenant_count:
          type: integer
          description: Only included for SuperUser callers.
        user_count:
          type: integer
        node_count:
          type: integer
        nodes_by_status:
          type: object
          additionalProperties:
            type: integer
          description: "Map of node status to count, e.g. {\"online\": 5, \"offline\": 2}"

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

    LoginResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            token:
              type: string
            totp_required:
              type: boolean

    TokenResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            token:
              type: string

    TOTPEnrollResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            secret:
              type: string
            provisioning_uri:
              type: string

    CreateAPIKeyResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            raw_key:
              type: string
              description: The full API key (shown once, cannot be retrieved again)
            api_key:
              $ref: "#/components/schemas/APIKey"

    DataResponse_Tenant:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Tenant"

    DataResponse_User:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/User"

    TenantListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Tenant"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer

    UserListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer

    APIKeyListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/APIKey"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer

    AuditEventListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer

    DataResponse_Node:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Node"

    DataResponse_NodeGroup:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/NodeGroup"

    DataResponse_SSHKey:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/SSHKey"

    DataResponse_Status:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/StatusOverview"

    NodeListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Node"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer

    NodeGroupListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/NodeGroup"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer

    DataResponse_ProvisioningJob:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/ProvisioningJob"

    DataResponse_Gateway:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Gateway"

    ProvisioningJobListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ProvisioningJob"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer

    GatewayListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Gateway"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer

    SSHKeyListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/SSHKey"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer

    # --- Networking Schemas ---

    BGPSessionStatus:
      type: string
      enum: [configured, active, down, removed]

    IPAllocationType:
      type: string
      enum: [anycast, unicast]

    IPAllocationPurpose:
      type: string
      enum: [dns, cdn, route]

    IPAllocationStatusEnum:
      type: string
      enum: [active, withdrawn, pending]

    BGPSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        node_id:
          type: string
          format: uuid
        peer_asn:
          type: integer
        peer_address:
          type: string
        local_asn:
          type: integer
        status:
          $ref: "#/components/schemas/BGPSessionStatus"
        announced_prefixes:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    IPAllocation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        prefix:
          type: string
        type:
          $ref: "#/components/schemas/IPAllocationType"
        purpose:
          $ref: "#/components/schemas/IPAllocationPurpose"
        status:
          $ref: "#/components/schemas/IPAllocationStatusEnum"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WireGuardPeer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        owner_type:
          type: string
          enum: [node, gateway, controller]
        owner_id:
          type: string
          format: uuid
        public_key:
          type: string
        allowed_ips:
          type: array
          items:
            type: string
        endpoint:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    NodeNetworkingState:
      type: object
      properties:
        node_id:
          type: string
          format: uuid
        wireguard_ip:
          type: string
        wireguard_peer:
          $ref: "#/components/schemas/WireGuardPeer"
        bgp_sessions:
          type: array
          items:
            $ref: "#/components/schemas/BGPSession"

    DataResponse_BGPSession:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/BGPSession"

    DataResponse_IPAllocation:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/IPAllocation"

    DataResponse_NodeNetworkingState:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/NodeNetworkingState"

    BGPSessionListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/BGPSession"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer

    IPAllocationListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/IPAllocation"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer

    WireGuardPeerListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/WireGuardPeer"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

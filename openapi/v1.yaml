        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer

    IPAllocationListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/IPAllocation"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer

    WireGuardPeerListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/WireGuardPeer"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer

    # --- DNS Schemas ---

    DNSZoneStatus:
      type: string
      enum: [active, disabled]

    DNSRecordType:
      type: string
      enum: [A, AAAA, CNAME, MX, TXT, NS, SRV, CAA, PTR]

    DNSZone:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
          description: Zone FQDN (e.g. "example.com")
        status:
          $ref: "#/components/schemas/DNSZoneStatus"
        serial:
          type: integer
          description: Auto-incremented on every zone/record mutation
        ttl:
          type: integer
          description: Default TTL for records in this zone
        node_group_id:
          type: string
          format: uuid
          nullable: true
          description: Node group assigned to serve this zone
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    DNSRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        zone_id:
          type: string
          format: uuid
        name:
          type: string
          description: Record name (e.g. "www", "@" for apex)
        type:
          $ref: "#/components/schemas/DNSRecordType"
        value:
          type: string
        ttl:
          type: integer
          nullable: true
        priority:
          type: integer
          nullable: true
          description: Required for MX and SRV records
        weight:
          type: integer
          nullable: true
          description: Used by SRV records
        port:
          type: integer
          nullable: true
          description: Used by SRV records
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ZoneWithRecords:
      type: object
      properties:
        zone:
          $ref: "#/components/schemas/DNSZone"
        records:
          type: array
          items:
            $ref: "#/components/schemas/DNSRecord"

    NodeDNSConfig:
      type: object
      description: Full DNS configuration snapshot for a node (polled every 30s).
      properties:
        zones:
          type: array
          items:
            $ref: "#/components/schemas/ZoneWithRecords"

    DataResponse_DNSZone:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/DNSZone"

    DataResponse_DNSRecord:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/DNSRecord"

    DataResponse_NodeDNSConfig:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/NodeDNSConfig"

    DNSZoneListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/DNSZone"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer

    DNSRecordListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/DNSRecord"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer

    # --- CDN Schemas ---

    CDNSiteStatus:
      type: string
      enum: [active, disabled]

    TLSMode:
      type: string
      enum: [auto, manual, disabled]

    CDNOriginScheme:
      type: string
      enum: [http, https]

    CDNOriginStatus:
      type: string
      enum: [healthy, unhealthy, unknown]

    HeaderRule:
      type: object
      required: [action, header]
      properties:
        action:
          type: string
          enum: [add, set, remove]
        header:
          type: string
          description: HTTP header name
        value:
          type: string
          description: Header value (required for add/set, optional for remove)

    CDNSite:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        domains:
          type: array
          items:
            type: string
          description: Hostnames this site serves
        tls_mode:
          $ref: "#/components/schemas/TLSMode"
        tls_cert_id:
          type: string
          format: uuid
          nullable: true
        cache_enabled:
          type: boolean
        cache_ttl:
          type: integer
          description: Cache TTL in seconds
        compression_enabled:
          type: boolean
        rate_limit_rps:
          type: integer
          nullable: true
        node_group_id:
          type: string
          format: uuid
          nullable: true
        header_rules:
          type: array
          items:
            $ref: "#/components/schemas/HeaderRule"
          nullable: true
        status:
          $ref: "#/components/schemas/CDNSiteStatus"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CDNOrigin:
      type: object
      properties:
        id:
          type: string
          format: uuid
        site_id:
          type: string
          format: uuid
        address:
          type: string
          description: "Origin server address (host:port)"
        scheme:
          $ref: "#/components/schemas/CDNOriginScheme"
        weight:
          type: integer
          description: Load balancing weight
        health_check_path:
          type: string
        health_check_interval:
          type: integer
          nullable: true
          description: Health check interval in seconds
        status:
          $ref: "#/components/schemas/CDNOriginStatus"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SiteWithOrigins:
      type: object
      properties:
        site:
          $ref: "#/components/schemas/CDNSite"
        origins:
          type: array
          items:
            $ref: "#/components/schemas/CDNOrigin"

    NodeCDNConfig:
      type: object
      description: Full CDN configuration snapshot for a node (polled every 30s).
      properties:
        sites:
          type: array
          items:
            $ref: "#/components/schemas/SiteWithOrigins"

    DataResponse_CDNSite:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/CDNSite"

    DataResponse_CDNOrigin:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/CDNOrigin"

    DataResponse_NodeCDNConfig:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/NodeCDNConfig"

    CDNSiteListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CDNSite"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer

    CDNOriginListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CDNOrigin"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

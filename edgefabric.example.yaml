# EdgeFabric Configuration
#
# Copy and adjust for your deployment:
#   cp edgefabric.example.yaml edgefabric.yaml
#
# For detailed, commented examples per role, see the examples/ directory:
#   examples/controller.yaml  — full controller config
#   examples/node.yaml        — full node config with all service modes
#   examples/gateway.yaml     — full gateway config
#
# All settings can be overridden via EF_-prefixed environment variables.

# Role: controller, node, or gateway.
role: controller

# Log level: debug, info, warn, error.
log_level: info

# --- Controller (role=controller) ---
controller:
  listen_addr: ":8443"
  external_url: "https://edgefabric.example.com:8443"

  storage:
    driver: sqlite
    dsn: "/var/lib/edgefabric/edgefabric.db"

  tls:
    enabled: false
    # cert_file: /etc/edgefabric/tls/cert.pem
    # key_file: /etc/edgefabric/tls/key.pem
    # auto_cert: false

  wireguard:
    listen_port: 51820
    subnet: "10.100.0.0/16"
    address: "10.100.0.1/16"

  secrets:
    # Generate with: openssl rand -base64 32
    encryption_key: ""
    # Separate JWT signing key (falls back to encryption_key if empty).
    token_signing_key: ""

# --- Node (role=node) ---
node:
  controller_addr: "10.100.0.1:8443"
  # enrollment_token: ""
  data_dir: /var/lib/edgefabric
  health_addr: ":9090"

  bgp:
    enabled: false
    mode: "noop"     # "gobgp" or "noop"
    # router_id: ""
    # local_asn: 0

  dns:
    enabled: false
    mode: "noop"     # "miekg" or "noop"
    listen_addr: ":5353"

  cdn:
    enabled: false
    mode: "noop"     # "proxy" or "noop"
    listen_addr: ":8080"

  route:
    enabled: false
    mode: "noop"     # "forwarder" or "noop"

# --- Gateway (role=gateway) ---
gateway:
  controller_addr: "10.100.0.1:8443"
  # enrollment_token: ""
  data_dir: /var/lib/edgefabric
  health_addr: ":9090"
  # wireguard_ip: "10.100.0.50"
  route_mode: "noop"   # "forwarder" or "noop"

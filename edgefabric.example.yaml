# EdgeFabric Configuration Example
# Copy this file to edgefabric.yaml and adjust for your deployment.

# Role determines which mode this instance runs in.
# Valid values: controller, node, gateway
role: controller

# Log level: debug, info, warn, error
log_level: info

# Controller-specific configuration (used when role=controller)
controller:
  # Address to listen on for HTTP/API.
  listen_addr: ":8443"

  # External URL for generating self-referencing links.
  external_url: "https://edgefabric.example.com:8443"

  # Persistence backend.
  storage:
    # Driver: sqlite or postgres
    driver: sqlite
    # DSN: file path for sqlite, connection string for postgres.
    dsn: "edgefabric.db"

  # TLS configuration for the API server.
  tls:
    enabled: false
    # cert_file: /path/to/cert.pem
    # key_file: /path/to/key.pem
    # auto_cert: false

  # WireGuard hub configuration.
  wireguard:
    listen_port: 51820
    subnet: "10.100.0.0/16"
    address: "10.100.0.1/16"

  # Secret encryption key (base64-encoded, 32 bytes for AES-256).
  # Generate with: edgefabric cli generate-key
  secrets:
    encryption_key: ""

# Node-specific configuration (used when role=node)
node:
  # Controller address (over WireGuard overlay).
  controller_addr: "10.100.0.1:8443"

  # One-time enrollment token (provided by controller during provisioning).
  # enrollment_token: ""

  # Local data directory.
  data_dir: /var/lib/edgefabric

# Gateway-specific configuration (used when role=gateway)
gateway:
  # Controller address (over WireGuard overlay).
  controller_addr: "10.100.0.1:8443"

  # One-time enrollment token.
  # enrollment_token: ""

  # Local data directory.
  data_dir: /var/lib/edgefabric

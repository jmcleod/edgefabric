# EdgeFabric Gateway — Docker Demo Configuration
#
# Uses forwarder mode to demonstrate route forwarding over the Docker
# bridge network. In production, wireguard_ip would be the gateway's
# WireGuard overlay address; here it's set to the Docker bridge IP
# so the gateway binds listeners on the reachable network interface.

role: gateway
log_level: info

gateway:
  # Controller address on the Docker bridge network (no TLS in demo).
  controller_addr: "http://172.20.0.2:8443"

  data_dir: /var/lib/edgefabric
  health_addr: ":9090"

  # Gateway's Docker bridge IP — used as the listener bind address.
  # In production this would be the WireGuard overlay IP (e.g., 10.100.0.50).
  # On macOS/Docker (no WireGuard) we use the bridge IP directly.
  wireguard_ip: "172.20.0.50"

  # Real forwarder — binds per-route TCP/UDP listeners and proxies
  # traffic to private destinations. Works without WireGuard.
  route_mode: "forwarder"

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  spa:
    name: SPA Build & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/console/package-lock.json

      - name: Install dependencies
        working-directory: web/console
        run: npm ci

      - name: TypeScript typecheck
        working-directory: web/console
        run: npx tsc --noEmit

      - name: Build SPA
        working-directory: web/console
        run: npm run build

      - name: Upload SPA build
        uses: actions/upload-artifact@v4
        with:
          name: spa-build
          path: web/static/

  build:
    needs: spa
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download SPA build
        uses: actions/download-artifact@v4
        with:
          name: spa-build
          path: web/static/

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.11.3
